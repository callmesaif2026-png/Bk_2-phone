<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notepad</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  height:100%;
  font-family:Arial,sans-serif;
  background:#fff;
  color:#111;
}
body{
  overflow:hidden;
}.page{
  height:100vh;
  overflow:auto;
  background-color:#fff;
  background-image:
    radial-gradient(circle, rgba(0,0,0,.22) 1.1px, transparent 1.2px);
  background-size:24px 24px;
  background-position:12px 12px;
}
#editor{
  min-height:calc(100vh + 500px);
  padding:22px 20px 120px;
  outline:none;
  font-size:20px;
  font-weight:700;
  line-height:1.7;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
  caret-color:#111;
}
#editor:empty:before{
  content:"এখানে লিখুন...";
  color:#8b8b8b;
  font-weight:600;
}
.save-status{
  position:fixed;
  right:14px;
  bottom:16px;
  padding:7px 10px;
  border-radius:9px;
  background:rgba(17,17,17,.85);
  color:#fff;
  font-size:11px;
  font-weight:700;
  opacity:0;
  transition:.2s ease;
  pointer-events:none;
}
.save-status.show{opacity:1}
</style>
</head>
<body>
<div class="page" id="page">
  <div id="editor" contenteditable="true" spellcheck="false"></div>
</div>

<div id="saveStatus" class="save-status">Saved</div>

<script>
(function(){
  "use strict";

  var KEY = "simple_notepad_v2";
  var editor = document.getElementById("editor");
  var page = document.getElementById("page");
  var status = document.getElementById("saveStatus");
  var timer = null;

  function showSaved(){
    status.classList.add("show");
    clearTimeout(showSaved.timer);
    showSaved.timer = setTimeout(function(){
      status.classList.remove("show");
    },900);
  }

  function save(){
    localStorage.setItem(KEY, editor.innerHTML);
    showSaved();
  }

  function placeCaretAtEnd(element){
    var range = document.createRange();
    var selection = window.getSelection();
    range.selectNodeContents(element);
    range.collapse(false);
    selection.removeAllRanges();
    selection.addRange(range);
  }

  editor.innerHTML = localStorage.getItem(KEY) || "";

  editor.addEventListener("input", function(){
    clearTimeout(timer);
    timer = setTimeout(save, 180);
  });



  page.addEventListener("click", function(e){
    if(e.target !== page) return;

    var editorRect = editor.getBoundingClientRect();
    var currentHeight = editor.scrollHeight;
    var clickedY = e.clientY - editorRect.top + page.scrollTop;
    var lineHeight = 34;

    if(clickedY > currentHeight - 20){
      var extraLines = Math.max(1, Math.ceil((clickedY - currentHeight) / lineHeight) + 1);
      for(var i=0; i<extraLines; i++){
        var line = document.createElement("div");
        line.innerHTML = "<br>";
        editor.appendChild(line);
      }
      save();
    }

    editor.focus();
    placeCaretAtEnd(editor);
  });

  window.addEventListener("beforeunload", save);
})();
</script>

</body>
</html>
