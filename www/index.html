<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bkash Personal List</title>
<style>
:root{
  --bg:#f3f7fa;
  --card:#ffffff;
  --soft:#f5f9fc;
  --border:#d9e4eb;
  --text:#163043;
  --muted:#728594;
  --pink:#e91e67;
  --pink2:#ff4f91;
  --green:#24b96a;
  --red:#ef5362;
  --orange:#f2a53b;
  --shadow:0 8px 22px rgba(44,77,98,.10);
}
*{box-sizing:border-box}
body{
  margin:0;
  background:linear-gradient(180deg,#f9fcfe 0%,#eef4f7 100%);
  color:var(--text);
  font-family:Arial,sans-serif;
}
button,input{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}

.app{
  max-width:760px;
  margin:auto;
  padding:10px 9px 80px;
}

.title-bar{
  margin:0 0 10px;
  padding:12px 14px;
  border-radius:16px;
  background:
    radial-gradient(circle at 90% 10%,rgba(255,255,255,.26),transparent 30%),
    linear-gradient(135deg,#c91257 0%,#ec1c70 55%,#ff5a98 100%);
  box-shadow:0 12px 28px rgba(214,20,90,.28);
  display:flex;
  align-items:center;
  gap:11px;
  overflow:hidden;
}
.title-icon{
  width:42px;
  height:42px;
  flex:0 0 42px;
  display:grid;
  place-items:center;
  border-radius:13px;
  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.28);
  color:#fff;
  font-size:24px;
  font-weight:900;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.25);
}
.title-bar h1{
  margin:0;
  color:#fff;
  font-size:21px;
  letter-spacing:.2px;
  line-height:1.1;
}
.title-bar p{
  margin:3px 0 0;
  color:rgba(255,255,255,.82);
  font-size:10px;
  letter-spacing:.2px;
}

.summary{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-bottom:9px;
}
.sum{
  min-width:0;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:9px 7px;
  box-shadow:var(--shadow);
}
.sum span{
  display:block;
  color:var(--muted);
  font-size:10px;
  margin-bottom:5px;
}
.sum strong{
  display:block;
  font-size:13px;
  word-break:break-word;
}

.blocks{display:grid;gap:8px}
.block{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:9px;
  box-shadow:var(--shadow);
}
.block-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:7px;
  margin-bottom:7px;
}
.block-name{
  display:flex;
  align-items:center;
  gap:7px;
  min-width:0;
}
.block-emoji{
  font-size:20px;
  line-height:1;
}
.block-date{
  color:var(--muted);
  font-size:11px;
  white-space:nowrap;
}
.actions{
  display:flex;
  gap:5px;
}
.action-btn{
  border:1px solid var(--border);
  background:var(--soft);
  color:var(--text);
  border-radius:8px;
  padding:6px 8px;
  font-size:10px;
}
.action-btn.limit-active{
  color:#fff;
  border-color:var(--pink);
  background:var(--pink);
}
.action-btn.delete{color:var(--red)}

.numbers{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:5px;
  margin-bottom:7px;
}
.number-row{
  min-width:0;
  background:var(--soft);
  border:1px solid #e6edf2;
  border-radius:9px;
  padding:6px 7px;
}
.number-main{
  display:flex;
  align-items:center;
  gap:7px;
  min-width:0;
}
.phone{
  flex:0 0 auto;
  font-size:14px;
  font-weight:800;
  line-height:1.1;
  letter-spacing:.25px;
  white-space:nowrap;
}
.number-used{
  margin-left:auto;
  color:var(--muted);
  font-size:9px;
  white-space:nowrap;
}
.number-limits{
  margin-left:auto;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:2px;
  min-width:0;
}
.mini-day{
  width:22px;
  height:22px;
  flex:0 0 22px;
  border:1px solid rgba(36,185,106,.35);
  background:rgba(36,185,106,.10);
  color:#17874d;
  border-radius:6px;
  padding:0;
  font-size:9px;
  font-weight:800;
  line-height:1;
}
.mini-day.used{
  border-color:rgba(239,83,98,.40);
  background:rgba(239,83,98,.14);
  color:#c33140;
}
.mini-day small{display:none}

.days{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:5px;
}
.day{
  min-width:0;
  border:1px solid rgba(36,185,106,.38);
  background:rgba(36,185,106,.10);
  color:#17874d;
  border-radius:8px;
  padding:6px 1px 5px;
  font-size:12px;
  font-weight:800;
  line-height:1;
}
.day.partial{
  border-color:rgba(242,165,59,.48);
  background:rgba(242,165,59,.14);
  color:#b87412;
}
.day.used{
  border-color:rgba(239,83,98,.45);
  background:rgba(239,83,98,.14);
  color:#c33140;
}
.day small{
  display:block;
  margin-top:3px;
  font-size:8px;
  line-height:1;
}

.empty{
  text-align:center;
  color:var(--muted);
  padding:28px 10px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  box-shadow:var(--shadow);
}

.fab{
  position:fixed;
  right:16px;
  bottom:20px;
  width:54px;
  height:54px;
  border:0;
  border-radius:50%;
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  color:#fff;
  font-size:30px;
  box-shadow:0 12px 28px rgba(233,30,103,.32);
}

.modal{
  position:fixed;
  inset:0;
  z-index:30;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding:9px;
  background:rgba(29,49,63,.35);
  backdrop-filter:blur(3px);
}
.modal-box{
  width:100%;
  max-width:520px;
  max-height:92vh;
  overflow:auto;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px 18px 9px 9px;
  padding:14px;
  box-shadow:0 20px 45px rgba(33,62,79,.22);
}
.modal-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}
.modal-head h2{margin:0;font-size:18px}
.close{
  width:36px;height:36px;border:0;border-radius:9px;
  background:var(--soft);color:var(--text)
}
.label{
  display:block;
  color:var(--muted);
  font-size:11px;
  margin:9px 0 5px;
}
.input{
  width:100%;
  height:40px;
  border:1px solid var(--border);
  background:#fbfdff;
  color:var(--text);
  border-radius:9px;
  padding:0 10px;
  outline:none;
}
.input:focus{
  border-color:var(--pink);
  box-shadow:0 0 0 3px rgba(233,30,103,.09);
}
.inputs{display:grid;gap:6px}
.input-line{
  display:grid;
  grid-template-columns:34px 1fr;
  gap:6px;
  align-items:center;
}
.idx{
  height:34px;
  display:grid;
  place-items:center;
  background:var(--soft);
  border-radius:8px;
  color:var(--pink);
  font-size:12px;
  font-weight:800;
}
.full-btn{
  width:100%;
  border:0;
  border-radius:9px;
  padding:11px;
  margin-top:10px;
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  color:#fff;
  font-weight:800;
}
.toast{
  position:fixed;
  left:50%;
  bottom:22px;
  z-index:40;
  transform:translateX(-50%);
  background:#173042;
  color:#fff;
  padding:9px 13px;
  border-radius:9px;
  font-size:12px;
  font-weight:700;
}
@media(max-width:420px){
  .title-bar h1{font-size:19px}
  .sum strong{font-size:12px}
  .numbers{grid-template-columns:repeat(2,minmax(0,1fr))}
  .phone{font-size:13px}
  .mini-day{width:20px;height:20px;flex-basis:20px;font-size:8px}
}
@media(max-width:340px){
  .numbers{grid-template-columns:1fr}
}
</style>

<body>

<div class="app">
  <div class="title-bar">
    <button class="menu-btn" type="button" aria-label="Menu">☰</button>
    <a class="notepad-btn" href="notepad.html">Notepad</a>
  </div>

  <div class="summary">
    <div class="sum">
      <span>মোট নাম্বার</span>
      <strong id="totalNumbers">0</strong>
    </div>
    <div class="sum">
      <span>মোট লিমিট</span>
      <strong id="totalLimit">৳0</strong>
    </div>
    <div class="sum">
      <span>বাকি লিমিট</span>
      <strong id="remainingLimit">৳0</strong>
    </div>
  </div>

  <div id="empty" class="empty">এখনও কোনো ব্লক যোগ করা হয়নি</div>
  <div id="blocks" class="blocks"></div>
</div>

<button id="addBlockBtn" class="fab" type="button">+</button>

  <div class="modal-box">
    <div class="modal-head">
      <h2>নতুন নাম্বার যোগ করুন</h2>
      <button class="close" type="button" id="closeModal">✕</button>
    </div>

    <div id="countStep">
      <label class="label">কয়টি নাম্বার দিবেন?</label>
      <input class="input" id="blockCount" type="number" min="1" max="50" value="4">
      <button class="full-btn" type="button" id="makeInputsBtn">Next</button>
    </div>

    <form id="numberForm" class="hidden">
      <div id="inputs" class="inputs"></div>
      <button class="full-btn" type="submit">Submit</button>
    </form>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "bks_manager_v4";
  var PER_NUMBER_LIMIT = 300000;
  var DAILY_AMOUNT = 50000;
  var data = loadData();
  var firebaseLoaded = false;

  function byId(id){ return document.getElementById(id); }

  function loadData(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return {blocks:[]};
      var parsed = JSON.parse(raw);
      if(parsed && Array.isArray(parsed.blocks)) return parsed;
    }catch(e){}
    return {blocks:[]};
  }

  function saveData(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    if(window.firebaseDB && firebaseLoaded){
      window.firebaseDB.ref("appData").set(data).catch(function(err){
        console.log(err);
        toast("Firebase error");
      });
    }
  }

  function money(value){
    return new Intl.NumberFormat("en-IN").format(value);
  }

  function todayInfo(){
    var d = new Date();
    return {
      full:d.toISOString().slice(0,10),
      day:String(d.getDate())
    };
  }

  function emojiNumber(n){
    var list=["1️⃣","2️⃣","3️⃣","4️⃣","5️⃣","6️⃣","7️⃣","8️⃣","9️⃣","🔟"];
    return list[n-1] || (n+"️⃣");
  }

  function toast(message){
    var t = byId("toast");
    t.textContent = message;
    t.classList.remove("hidden");
    clearTimeout(toast.timer);
    toast.timer=setTimeout(function(){t.classList.add("hidden");},1700);
  }

  function normalizeBlock(block){
    if(typeof block.limitMode !== "boolean") block.limitMode=false;

    if(!Array.isArray(block.marks)){
      block.marks = block.numbers.map(function(){
        return [null,null,null,null,null,null];
      });

      if(Array.isArray(block.days)){
        block.days.forEach(function(used,dayIndex){
          if(used){
            var info=todayInfo();
            block.marks.forEach(function(row){ row[dayIndex]=info; });
          }
        });
      }
    }

    while(block.marks.length < block.numbers.length){
      block.marks.push([null,null,null,null,null,null]);
    }
  }

  data.blocks.forEach(normalizeBlock);

  function getUsedCount(block){
    var count=0;
    block.marks.forEach(function(row){
      row.forEach(function(mark){ if(mark) count++; });
    });
    return count;
  }

  function latestDate(block){
    var latest=null;
    block.marks.forEach(function(row){
      row.forEach(function(mark){
        if(mark && mark.full && (!latest || mark.full > latest.full)) latest=mark;
      });
    });
    return latest ? latest.day+" তারিখ" : "";
  }

  function dayState(block,dayIndex){
    var marked=0;
    var dateText="";
    block.marks.forEach(function(row){
      if(row[dayIndex]){
        marked++;
        dateText=row[dayIndex].day;
      }
    });

    if(marked===0) return {className:"",date:""};
    if(marked===block.numbers.length) return {className:"used",date:dateText};
    return {className:"partial",date:dateText};
  }

  function openModal(){
    byId("countStep").classList.remove("hidden");
    byId("numberForm").classList.add("hidden");
    byId("inputs").innerHTML="";
    byId("modal").classList.remove("hidden");
  }

  function closeModal(){
    byId("modal").classList.add("hidden");
    byId("inputs").innerHTML="";
  }

  function makeInputs(){
    var count=parseInt(byId("blockCount").value,10);
    if(isNaN(count)||count<1) count=1;
    if(count>50) count=50;

    var wrap=byId("inputs");
    wrap.innerHTML="";

    for(var i=1;i<=count;i++){
      var row=document.createElement("div");
      row.className="input-line";
      row.innerHTML=
        '<div class="idx">'+i+'</div>'+
        '<input class="input phone-input" type="tel" inputmode="numeric" maxlength="11" placeholder="01XXXXXXXXX" required>';
      wrap.appendChild(row);
    }

    byId("countStep").classList.add("hidden");
    byId("numberForm").classList.remove("hidden");

    setTimeout(function(){
      var first=document.querySelector(".phone-input");
      if(first) first.focus();
    },40);
  }

  function blockProgress(block){
    var totalSlots=block.numbers.length*6;
    var used=getUsedCount(block);
    var percent=totalSlots ? Math.round((used/totalSlots)*100) : 0;
    var color="white";
    if(percent>0 && percent<50) color="green";
    else if(percent>=50 && percent<84) color="yellow";
    else if(percent>=84) color="red";
    return {percent:percent,color:color};
  }

  function render(){
    var container=byId("blocks");
    container.innerHTML="";

    var totalNumbers=0;
    var totalUsedMarks=0;

    data.blocks.forEach(function(block,index){
      normalizeBlock(block);
      var progress=blockProgress(block);

      totalNumbers+=block.numbers.length;
      totalUsedMarks+=getUsedCount(block);

      var numbersHtml=block.numbers.map(function(number,numberIndex){
        var usedForNumber=block.marks[numberIndex].filter(Boolean).length;

        var miniButtons="";
        if(block.limitMode){
          miniButtons='<div class="number-limits">'+
            block.marks[numberIndex].map(function(mark,dayIndex){
              return '<button type="button" class="mini-day '+(mark?'used':'')+'" '+
                'data-action="number-day" data-id="'+block.id+'" data-number="'+numberIndex+'" data-day="'+dayIndex+'">'+
                (dayIndex+1)+(mark?'<small>'+mark.day+'</small>':'')+
              '</button>';
            }).join("")+
          '</div>';
        }

        return '<div class="number-row">'+
          '<div class="number-main">'+
            '<div class="phone">'+number+'</div>'+
            (block.limitMode ? miniButtons : '<div class="number-used">'+usedForNumber+'/6</div>')+
          '</div>'+
        '</div>';
      }).join("");

      var dayButtons="";
      for(var d=0;d<6;d++){
        var state=dayState(block,d);
        dayButtons+='<button type="button" class="day '+state.className+'" data-action="block-day" data-id="'+block.id+'" data-day="'+d+'">'+
          (d+1)+(state.date?'<small>'+state.date+'</small>':'')+
        '</button>';
      }

      var div=document.createElement("div");
      div.className="block";
      div.innerHTML=
        '<div class="block-top">'+
          '<div class="block-name">'+
            '<span class="block-progress-circle '+progress.color+'">'+
              '<span class="serial">'+(index+1)+'</span>'+
              '<span class="percent">'+progress.percent+'%</span>'+
            '</span>'+
            '<span class="block-date">'+latestDate(block)+'</span>'+
          '</div>'+
          '<div class="actions">'+
            '<button type="button" class="action-btn '+(block.limitMode?'limit-active':'')+'" data-action="limit" data-id="'+block.id+'">Limit</button>'+
            '<button type="button" class="action-btn" data-action="copy" data-id="'+block.id+'">Copy</button>'+
            '<button type="button" class="action-btn delete" data-action="delete" data-id="'+block.id+'">Delete</button>'+
          '</div>'+
        '</div>'+
        '<div class="numbers">'+numbersHtml+'</div>'+
        '<div class="days">'+dayButtons+'</div>';

      container.appendChild(div);
    });

    var totalLimit=totalNumbers*PER_NUMBER_LIMIT;
    var remaining=Math.max(totalLimit-(totalUsedMarks*DAILY_AMOUNT),0);

    byId("totalNumbers").textContent=totalNumbers;
    byId("totalLimit").textContent="৳"+money(totalLimit);
    byId("remainingLimit").textContent="৳"+money(remaining);
    byId("empty").style.display=data.blocks.length?"none":"block";
  }

  function toggleMark(block,numberIndex,dayIndex){
    if(block.marks[numberIndex][dayIndex]){
      block.marks[numberIndex][dayIndex]=null;
    }else{
      block.marks[numberIndex][dayIndex]=todayInfo();
    }
  }

  function toggleWholeDay(block,dayIndex){
    var allMarked=block.marks.every(function(row){return !!row[dayIndex];});

    block.marks.forEach(function(row){
      row[dayIndex]=allMarked ? null : todayInfo();
    });
  }

  byId("addBlockBtn").addEventListener("click",openModal);
  byId("closeModal").addEventListener("click",closeModal);
  byId("makeInputsBtn").addEventListener("click",makeInputs);

  byId("modal").addEventListener("click",function(e){
    if(e.target===byId("modal")) closeModal();
  });

  byId("numberForm").addEventListener("submit",function(e){
    e.preventDefault();

    var inputs=Array.prototype.slice.call(document.querySelectorAll(".phone-input"));
    var numbers=inputs.map(function(input){return input.value.replace(/\D/g,"");});

    if(numbers.some(function(n){return !/^01\d{9}$/.test(n);})){
      toast("সঠিক ১১ ডিজিটের নাম্বার দিন");
      return;
    }

    data.blocks.push({
      id:String(Date.now())+Math.random().toString(16).slice(2),
      numbers:numbers,
      limitMode:false,
      marks:numbers.map(function(){return [null,null,null,null,null,null];})
    });

    saveData();
    render();
    closeModal();
    toast("Block added");
  });

  byId("blocks").addEventListener("click",function(e){
    var btn=e.target.closest("button[data-action]");
    if(!btn) return;

    var block=data.blocks.find(function(b){return b.id===btn.dataset.id;});
    if(!block) return;

    var action=btn.dataset.action;

    if(action==="limit"){
      block.limitMode=!block.limitMode;
      saveData();
      render();
    }

    if(action==="block-day"){
      toggleWholeDay(block,parseInt(btn.dataset.day,10));
      saveData();
      render();
    }

    if(action==="number-day"){
      toggleMark(
        block,
        parseInt(btn.dataset.number,10),
        parseInt(btn.dataset.day,10)
      );
      saveData();
      render();
    }

    if(action==="copy"){
      var text=block.numbers.join("\n");

      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(function(){
          toast("সব নাম্বার কপি হয়েছে");
        }).catch(function(){fallbackCopy(text);});
      }else{
        fallbackCopy(text);
      }
    }

    if(action==="delete"){
      if(confirm("এই ব্লক ডিলিট করবেন?")){
        data.blocks=data.blocks.filter(function(b){return b.id!==block.id;});
        saveData();
        render();
      }
    }
  });

  function fallbackCopy(text){
    var ta=document.createElement("textarea");
    ta.value=text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();
    toast("সব নাম্বার কপি হয়েছে");
  }

  if(window.firebaseDB){
    window.firebaseDB.ref("appData").on("value", function(snapshot){
      var cloudData = snapshot.val();

      if(cloudData && Array.isArray(cloudData.blocks)){
        data = cloudData;
        data.blocks.forEach(normalizeBlock);
      }

      firebaseLoaded = true;
      render();
    });
  }

  render();
})();
</script>
</body>
</html>
