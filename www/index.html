<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bkash Personal List Live Sync</title>

<style>
:root{
  --bg:#eef4f7;
  --card:#ffffff;
  --soft:#f4f8fb;
  --border:#d7e2e9;
  --text:#173145;
  --muted:#718594;
  --pink:#e81767;
  --pink2:#ff5594;
  --green:#28b96b;
  --yellow:#e8b731;
  --red:#ef5362;
  --shadow:0 8px 22px rgba(40,76,98,.11);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:linear-gradient(180deg,#f9fcfe 0%,var(--bg) 100%);
  color:var(--text);
  font-family:Arial,sans-serif;
}
button,input,a{font:inherit}
button{cursor:pointer}
a{text-decoration:none}
.hidden{display:none!important}

.app{
  width:min(760px,100%);
  margin:auto;
  padding:10px 9px 86px;
}

/* Top menu */
.title-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:11px 12px;
  margin-bottom:10px;
  border-radius:15px;
  background:linear-gradient(135deg,#d9125e,#ff5795);
  box-shadow:0 10px 24px rgba(232,23,103,.24);
}
.menu-btn{
  width:39px;
  height:39px;
  border:1px solid rgba(255,255,255,.36);
  border-radius:11px;
  background:rgba(255,255,255,.14);
  color:#fff;
  font-size:22px;
  font-weight:900;
}
.notepad-btn{
  padding:10px 14px;
  border:1px solid rgba(255,255,255,.38);
  border-radius:11px;
  background:rgba(255,255,255,.15);
  color:#fff;
  font-size:13px;
  font-weight:800;
}

/* Summary */
.summary{
  display:grid;
  grid-template-columns:.76fr 1.18fr 1.18fr;
  gap:6px;
  margin-bottom:9px;
}
.sum{
  min-width:0;
  min-height:91px;
  padding:9px 7px;
  border:1px solid var(--border);
  border-radius:14px;
  background:var(--card);
  box-shadow:var(--shadow);
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
.sum span{
  display:block;
  margin-bottom:6px;
  color:var(--muted);
  font-size:10px;
}
.sum strong{
  display:block;
  max-width:100%;
  color:var(--text);
  font-size:14px;
  line-height:1.15;
  white-space:nowrap;
  letter-spacing:-.3px;
}
.donut{
  --used:0deg;
  width:70px;
  height:70px;
  position:relative;
  display:grid;
  place-items:center;
  border-radius:50%;
  background:conic-gradient(
    var(--red) 0deg var(--used),
    #e8eef2 var(--used) 360deg
  );
  box-shadow:0 5px 14px rgba(34,67,88,.14);
}
.donut::before{
  content:"";
  position:absolute;
  inset:9px;
  border-radius:50%;
  background:#fff;
  box-shadow:inset 0 0 0 1px #e4ebef;
}
.donut-inner{
  position:relative;
  z-index:1;
  text-align:center;
  line-height:1;
}
.donut-inner strong{
  font-size:19px;
  letter-spacing:-.6px;
}
.donut-inner small{
  display:block;
  margin-top:4px;
  color:var(--muted);
  font-size:7px;
  font-weight:800;
}

/* Blocks */
.blocks{display:grid;gap:8px}
.block{
  padding:9px;
  border:1px solid var(--border);
  border-radius:15px;
  background:var(--card);
  box-shadow:var(--shadow);
}
.block-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:7px;
  margin-bottom:7px;
}
.block-head-left{
  display:flex;
  align-items:center;
  gap:7px;
  min-width:0;
}
.block-circle{
  width:48px;
  height:48px;
  flex:0 0 48px;
  border:2px solid var(--border);
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:#fff;
  color:var(--text);
  line-height:1;
  transition:.2s;
}
.block-circle .serial{
  font-size:17px;
  font-weight:900;
}
.block-circle .percent{
  margin-top:3px;
  font-size:8px;
  font-weight:900;
}
.block-circle.green{
  border-color:var(--green);
  background:#e5f7ee;
  color:#13864a;
}
.block-circle.yellow{
  border-color:var(--yellow);
  background:#fff5d6;
  color:#9a730e;
}
.block-circle.red{
  border-color:var(--red);
  background:#ffe5e8;
  color:#c22d3c;
}
.block-date{
  color:var(--muted);
  font-size:11px;
  white-space:nowrap;
}
.actions{
  display:flex;
  gap:4px;
  flex-wrap:nowrap;
}
.action-btn{
  border:1px solid var(--border);
  border-radius:8px;
  padding:6px 7px;
  background:var(--soft);
  color:var(--text);
  font-size:10px;
}
.action-btn.active{
  border-color:var(--pink);
  background:var(--pink);
  color:#fff;
}
.action-btn.amount-active{
  border-color:var(--green);
  background:var(--green);
  color:#fff;
}
.action-btn.delete{color:var(--red)}

.numbers{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:5px;
  margin-bottom:7px;
}
.number-row{
  min-width:0;
  padding:6px 7px;
  border:1px solid #e4ecf1;
  border-radius:9px;
  background:var(--soft);
}
.number-main{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:5px;
}
.phone{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  color:var(--text);
  font-size:14px;
  font-weight:900;
  letter-spacing:.2px;
}
.number-used{
  flex:0 0 auto;
  color:var(--muted);
  font-size:9px;
}
.number-limits{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:3px;
  margin-top:5px;
}
.mini-day{
  min-width:0;
  padding:4px 0 3px;
  border:1px solid rgba(40,185,107,.36);
  border-radius:6px;
  background:rgba(40,185,107,.10);
  color:#16874c;
  font-size:9px;
  font-weight:800;
  line-height:1;
}
.mini-day.used{
  border-color:rgba(239,83,98,.42);
  background:rgba(239,83,98,.14);
  color:#c42e3d;
}
.mini-day small{
  display:block;
  margin-top:2px;
  font-size:7px;
}
.days{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:5px;
}
.day{
  min-width:0;
  padding:6px 1px 5px;
  border:1px solid rgba(40,185,107,.40);
  border-radius:8px;
  background:rgba(40,185,107,.10);
  color:#16874c;
  font-size:12px;
  font-weight:900;
  line-height:1;
}
.day.partial{
  border-color:rgba(232,183,49,.52);
  background:rgba(232,183,49,.14);
  color:#98700e;
}
.day.used{
  border-color:rgba(239,83,98,.46);
  background:rgba(239,83,98,.14);
  color:#c42e3d;
}
.day small{
  display:block;
  margin-top:3px;
  font-size:8px;
}

.empty{
  padding:28px 10px;
  border:1px solid var(--border);
  border-radius:14px;
  background:var(--card);
  color:var(--muted);
  text-align:center;
  box-shadow:var(--shadow);
}
.fab{
  position:fixed;
  right:16px;
  bottom:20px;
  width:55px;
  height:55px;
  border:0;
  border-radius:50%;
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  color:#fff;
  font-size:31px;
  box-shadow:0 12px 28px rgba(232,23,103,.33);
}

/* Modal */
.modal{
  position:fixed;
  inset:0;
  z-index:30;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding:9px;
  background:rgba(24,44,58,.36);
  backdrop-filter:blur(3px);
}
.modal-box{
  width:100%;
  max-width:520px;
  max-height:92vh;
  overflow:auto;
  padding:14px;
  border:1px solid var(--border);
  border-radius:19px 19px 9px 9px;
  background:var(--card);
  box-shadow:0 22px 48px rgba(30,57,73,.22);
}
.modal-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
}
.modal-head h2{
  margin:0;
  font-size:18px;
}
.close{
  width:37px;
  height:37px;
  border:0;
  border-radius:9px;
  background:var(--soft);
  color:var(--text);
}
.label{
  display:block;
  margin:9px 0 5px;
  color:var(--muted);
  font-size:11px;
}
.input{
  width:100%;
  height:41px;
  padding:0 10px;
  border:1px solid var(--border);
  border-radius:9px;
  outline:none;
  background:#fbfdff;
  color:var(--text);
}
.input:focus{
  border-color:var(--pink);
  box-shadow:0 0 0 3px rgba(232,23,103,.09);
}
.inputs{display:grid;gap:6px}
.input-line{
  display:grid;
  grid-template-columns:34px 1fr;
  align-items:center;
  gap:6px;
}
.idx{
  height:34px;
  border-radius:8px;
  display:grid;
  place-items:center;
  background:var(--soft);
  color:var(--pink);
  font-size:12px;
  font-weight:900;
}
.full-btn{
  width:100%;
  margin-top:10px;
  padding:11px;
  border:0;
  border-radius:9px;
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  color:#fff;
  font-weight:900;
}
.back-btn{
  width:100%;
  margin-top:7px;
  padding:10px;
  border:1px solid var(--border);
  border-radius:9px;
  background:var(--soft);
  color:var(--text);
}
.toast{
  position:fixed;
  left:50%;
  bottom:22px;
  z-index:40;
  transform:translateX(-50%);
  padding:9px 13px;
  border-radius:9px;
  background:#173145;
  color:#fff;
  font-size:12px;
  font-weight:800;
  white-space:nowrap;
}

@media(max-width:420px){
  .summary{grid-template-columns:.72fr 1.2fr 1.2fr;gap:5px}
  .sum{min-height:84px;padding:7px 5px}
  .sum span{font-size:9px}
  .sum strong{font-size:12px}
  .donut{width:64px;height:64px}
  .donut::before{inset:8px}
  .donut-inner strong{font-size:17px}
  .actions{gap:3px}
  .action-btn{padding:6px 5px;font-size:9px}
  .phone{font-size:13px}
}
@media(max-width:340px){
  .numbers{grid-template-columns:1fr}
}
</style>

<div class="app">

  <div class="title-bar">
    <button class="menu-btn" type="button" aria-label="Menu">≡</button>

      <div class="donut" id="usedDonut">

    <div class="sum">
      <span id="totalLimitLabel">নাম্বার 0 টি ➤ লিমিট</span>
      <strong id="totalLimit">৳0</strong>

      <span>বাকি লিমিট</span>
      <strong id="remainingLimit">৳0</strong>

      <h2>নতুন নাম্বার যোগ করুন</h2>
      <button class="close" id="closeModal" type="button">✕</button>

      <label class="label" for="blockCount">কয়টি নাম্বার দিবেন?</label>
      <input class="input" id="blockCount" type="number" inputmode="numeric" min="1" max="50" value="4">

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "bks_manager_v18";
  var FIREBASE_PATH = "appDataJsonV18";
  var PER_NUMBER_LIMIT = 300000;
  var DAILY_AMOUNT = 50000;
  var data = loadData();
  var cloudReady = false;
  var applyingCloudData = false;

  function byId(id){
    return document.getElementById(id);
  }

  function newId(){
    return String(Date.now()) + Math.random().toString(16).slice(2);
  }

  function loadData(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return {blocks:[]};

      var parsed = JSON.parse(raw);
      if(parsed && Array.isArray(parsed.blocks)){
        return parsed;
      }
    }catch(error){
      console.error(error);
    }
    return {blocks:[]};
  }

  function saveLocalData(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }catch(error){
      console.error("Local save failed:", error);
    }
  }

  function saveData(){
    saveLocalData();

    if(window.firebaseDB && cloudReady && !applyingCloudData){
      window.firebaseDB.ref(FIREBASE_PATH).set(JSON.stringify(data))
        .catch(function(error){
          console.error("Firebase save failed:", error);
          toast("Cloud save হয়নি, ফোনে save হয়েছে");
        });
    }
  }

  function normalizePhone(value){
    return String(value || "").replace(/\D/g,"");
  }

  function validPhone(value){
    return /^01\d{9}$/.test(value);
  }

  function formatMoney(value){
    return new Intl.NumberFormat("en-IN").format(Number(value || 0));
  }

  function todayMark(){
    var d = new Date();
    var year = d.getFullYear();
    var month = String(d.getMonth()+1).padStart(2,"0");
    var day = String(d.getDate()).padStart(2,"0");

    return {
      full:year+"-"+month+"-"+day,
      day:String(d.getDate())
    };
  }

  function normalizeBlock(block){
    if(!Array.isArray(block.numbers)){
      block.numbers = [];
    }

    if(typeof block.limitMode !== "boolean"){
      block.limitMode = false;
    }

    if(typeof block.copyAmountMode !== "boolean"){
      block.copyAmountMode = false;
    }

    if(!Array.isArray(block.marks)){
      block.marks = block.numbers.map(function(){
        return [null,null,null,null,null,null];
      });

      if(Array.isArray(block.days)){
        block.days.forEach(function(used, dayIndex){
          if(used){
            block.marks.forEach(function(row){
              row[dayIndex] = todayMark();
            });
          }
        });
      }
    }

    while(block.marks.length < block.numbers.length){
      block.marks.push([null,null,null,null,null,null]);
    }

    block.marks = block.marks.slice(0, block.numbers.length);

    block.marks.forEach(function(row, rowIndex){
      if(!Array.isArray(row)){
        block.marks[rowIndex] = [null,null,null,null,null,null];
        return;
      }

      while(row.length < 6){
        row.push(null);
      }

      block.marks[rowIndex] = row.slice(0,6);
    });

    if(!block.id){
      block.id = newId();
    }
  }

  data.blocks.forEach(normalizeBlock);

  function toast(message){
    var element = byId("toast");
    element.textContent = message;
    element.classList.remove("hidden");

    clearTimeout(toast.timer);
    toast.timer = setTimeout(function(){
      element.classList.add("hidden");
    },1800);
  }

  function getUsedMarks(block){
    var count = 0;

    block.marks.forEach(function(row){
      row.forEach(function(mark){
        if(mark) count++;
      });
    });

    return count;
  }

  function blockProgress(block){
    var maximum = block.numbers.length * 6;
    var used = getUsedMarks(block);
    var percent = maximum ? Math.round((used / maximum) * 100) : 0;
    var averageDays = block.numbers.length ? used / block.numbers.length : 0;
    var color = "";

    if(averageDays > 0 && averageDays <= 3){
      color = "green";
    }else if(averageDays > 3 && averageDays < 6){
      color = "yellow";
    }else if(averageDays >= 6){
      color = "red";
    }

    return {
      percent:percent,
      color:color
    };
  }

  function latestDate(block){
    var latest = null;

    block.marks.forEach(function(row){
      row.forEach(function(mark){
        if(mark && mark.full && (!latest || mark.full > latest.full)){
          latest = mark;
        }
      });
    });

    return latest ? latest.day+" তারিখ" : "";
  }

  function dayState(block, dayIndex){
    var marked = 0;
    var dateText = "";

    block.marks.forEach(function(row){
      if(row[dayIndex]){
        marked++;
        dateText = row[dayIndex].day;
      }
    });

    if(marked === 0){
      return {className:"",date:""};
    }

    if(marked === block.numbers.length){
      return {className:"used",date:dateText};
    }

    return {className:"partial",date:dateText};
  }

  function render(){
    var container = byId("blocks");
    container.innerHTML = "";

    var totalNumbers = 0;
    var totalUsedMarks = 0;

    data.blocks.forEach(function(block,index){
      normalizeBlock(block);

      totalNumbers += block.numbers.length;
      totalUsedMarks += getUsedMarks(block);

      var progress = blockProgress(block);

      var numbersHtml = block.numbers.map(function(number,numberIndex){
        var usedForNumber = block.marks[numberIndex].filter(Boolean).length;
        var miniButtons = "";

        if(block.limitMode){
          miniButtons =
            '<div class="number-limits">'+
              block.marks[numberIndex].map(function(mark,dayIndex){
                return (
                  '<button type="button" '+
                    'class="mini-day '+(mark ? "used" : "")+'" '+
                    'data-action="number-day" '+
                    'data-id="'+block.id+'" '+
                    'data-number="'+numberIndex+'" '+
                    'data-day="'+dayIndex+'">'+
                    (dayIndex+1)+
                    (mark ? '<small>'+mark.day+'</small>' : '')+
                  '</button>'
                );
              }).join("")+
            '</div>';
        }

        return (
          '<div class="number-row">'+
            '<div class="number-main">'+
              '<div class="phone">'+number+'</div>'+
              '<div class="number-used">'+usedForNumber+'/6</div>'+
            '</div>'+
            miniButtons+
          '</div>'
        );
      }).join("");

      var dayButtons = "";

      for(var dayIndex=0; dayIndex<6; dayIndex++){
        var state = dayState(block,dayIndex);

        dayButtons += (
          '<button type="button" '+
            'class="day '+state.className+'" '+
            'data-action="block-day" '+
            'data-id="'+block.id+'" '+
            'data-day="'+dayIndex+'">'+
            (dayIndex+1)+
            (state.date ? '<small>'+state.date+'</small>' : '')+
          '</button>'
        );
      }

      var blockElement = document.createElement("section");
      blockElement.className = "block";

      blockElement.innerHTML =
        '<div class="block-top">'+
          '<div class="block-head-left">'+
            '<div class="block-circle '+progress.color+'">'+
              '<span class="serial">'+(index+1)+'</span>'+
              '<span class="percent">'+progress.percent+'%</span>'+
            '</div>'+
            '<span class="block-date">'+latestDate(block)+'</span>'+
          '</div>'+
          '<div class="actions">'+
            '<button type="button" class="action-btn '+(block.copyAmountMode ? "amount-active" : "")+'" data-action="copy-amount" data-id="'+block.id+'">50</button>'+
            '<button type="button" class="action-btn '+(block.limitMode ? "active" : "")+'" data-action="limit" data-id="'+block.id+'">Limit</button>'+
            '<button type="button" class="action-btn" data-action="copy" data-id="'+block.id+'">Copy</button>'+
            '<button type="button" class="action-btn edit" data-action="edit" data-id="'+block.id+'">Edit</button>'+
            '<button type="button" class="action-btn delete" data-action="delete" data-id="'+block.id+'">Delete</button>'+
          '</div>'+
        '</div>'+
        '<div class="numbers">'+numbersHtml+'</div>'+
        '<div class="days">'+dayButtons+'</div>';

      container.appendChild(blockElement);
    });

    var totalLimit = totalNumbers * PER_NUMBER_LIMIT;
    var usedAmount = totalUsedMarks * DAILY_AMOUNT;
    var remaining = Math.max(totalLimit - usedAmount,0);
    var remainingPercent = totalLimit ? Math.round((remaining / totalLimit) * 100) : 100;

    byId("totalLimitLabel").textContent = "নাম্বার "+totalNumbers+" টি ➤ লিমিট";
    byId("totalLimit").textContent = "৳"+formatMoney(totalLimit);
    byId("remainingLimit").textContent = "৳"+formatMoney(remaining);
    byId("usedPercent").textContent = remainingPercent+"%";

    var donut = byId("usedDonut");
    donut.style.setProperty("--used",(remainingPercent*3.6)+"deg");
    donut.classList.remove("green","yellow","red");

    if(remainingPercent > 50){
      donut.classList.add("green");
    }else if(remainingPercent > 20){
      donut.classList.add("yellow");
    }else{
      donut.classList.add("red");
    }

    byId("empty").style.display = data.blocks.length ? "none" : "block";
  }

  function openModal(){
    byId("countStep").classList.remove("hidden");
    byId("numberForm").classList.add("hidden");
    byId("inputs").innerHTML = "";
    byId("blockCount").value = "4";
    byId("editingBlockId").value = "";
    byId("modal").classList.remove("hidden");
  }

  function closeModal(){
    byId("modal").classList.add("hidden");
    byId("inputs").innerHTML = "";
    byId("editingBlockId").value = "";
    byId("numberForm").reset();
  }

  function makeInputs(){
    var count = parseInt(byId("blockCount").value,10);

    if(!Number.isFinite(count) || count < 1){
      toast("কয়টি নাম্বার দিবেন লিখুন");
      return;
    }

    count = Math.min(count,50);
    byId("blockCount").value = String(count);

    var wrap = byId("inputs");
    wrap.innerHTML = "";

    for(var index=1; index<=count; index++){
      var row = document.createElement("div");
      row.className = "input-line";
      row.innerHTML =
        '<div class="idx">'+index+'</div>'+
        '<input class="input phone-input" '+
          'type="tel" inputmode="numeric" maxlength="11" '+
          'autocomplete="off" placeholder="01XXXXXXXXX" required>';
      wrap.appendChild(row);
    }

    byId("countStep").classList.add("hidden");
    byId("numberForm").classList.remove("hidden");

    setTimeout(function(){
      var first = document.querySelector(".phone-input");
      if(first) first.focus();
    },50);
  }


  function openEditModal(block){
    normalizeBlock(block);

    byId("editingBlockId").value = block.id;
    byId("countStep").classList.add("hidden");
    byId("numberForm").classList.remove("hidden");
    byId("inputs").innerHTML = "";

    block.numbers.forEach(function(number,index){
      var row = document.createElement("div");
      row.className = "input-line";
      row.innerHTML =
        '<div class="idx">'+(index+1)+'</div>'+
        '<input class="input phone-input" '+
          'type="tel" inputmode="numeric" maxlength="11" '+
          'autocomplete="off" value="'+number+'" required>';
      byId("inputs").appendChild(row);
    });

    byId("modal").classList.remove("hidden");

    setTimeout(function(){
      var first = document.querySelector(".phone-input");
      if(first) first.focus();
    },50);
  }

  function toggleOne(block,numberIndex,dayIndex){
    block.marks[numberIndex][dayIndex] =
      block.marks[numberIndex][dayIndex] ? null : todayMark();
  }

  function toggleWholeDay(block,dayIndex){
    var allMarked = block.marks.every(function(row){
      return Boolean(row[dayIndex]);
    });

    block.marks.forEach(function(row){
      row[dayIndex] = allMarked ? null : todayMark();
    });
  }

  function copyFallback(text,message){
    var textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.style.position = "fixed";
    textarea.style.opacity = "0";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();

    try{
      document.execCommand("copy");
      toast(message);
    }catch(error){
      toast("Copy করা যায়নি");
    }

    textarea.remove();
  }

  function copyText(text,message){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text)
        .then(function(){
          toast(message);
        })
        .catch(function(){
          copyFallback(text,message);
        });
    }else{
      copyFallback(text,message);
    }
  }

  byId("addBlockBtn").addEventListener("click",openModal);
  byId("closeModal").addEventListener("click",closeModal);
  byId("makeInputsBtn").addEventListener("click",makeInputs);

  byId("backBtn").addEventListener("click",function(){
    byId("numberForm").classList.add("hidden");
    byId("countStep").classList.remove("hidden");
    byId("inputs").innerHTML = "";
  });

  byId("modal").addEventListener("click",function(event){
    if(event.target === byId("modal")){
      closeModal();
    }
  });

  byId("numberForm").addEventListener("submit",function(event){
    event.preventDefault();

    var inputElements = Array.prototype.slice.call(
      document.querySelectorAll("#inputs .phone-input")
    );

    if(inputElements.length === 0){
      toast("আগে Next চাপুন");
      return;
    }

    var numbers = inputElements.map(function(input){
      return normalizePhone(input.value);
    });

    var emptyIndex = numbers.findIndex(function(number){
      return number.length === 0;
    });

    if(emptyIndex !== -1){
      inputElements[emptyIndex].focus();
      toast((emptyIndex+1)+" নম্বর ইনপুট খালি");
      return;
    }

    var invalidIndex = numbers.findIndex(function(number){
      return !validPhone(number);
    });

    if(invalidIndex !== -1){
      inputElements[invalidIndex].focus();
      toast((invalidIndex+1)+" নম্বরটি সঠিক নয়");
      return;
    }

    var unique = new Set(numbers);

    if(unique.size !== numbers.length){
      toast("একই ব্লকে ডুপ্লিকেট নাম্বার আছে");
      return;
    }

    var editingId = byId("editingBlockId").value;

    if(editingId){
      var editingBlock = data.blocks.find(function(item){
        return item.id === editingId;
      });

      if(!editingBlock){
        toast("Edit block পাওয়া যায়নি");
        return;
      }

      var oldMarks = editingBlock.marks || [];

      editingBlock.numbers = numbers;
      editingBlock.marks = numbers.map(function(number,index){
        if(oldMarks[index] && Array.isArray(oldMarks[index])){
          return oldMarks[index].slice(0,6);
        }
        return [null,null,null,null,null,null];
      });

      normalizeBlock(editingBlock);
      toast("Block update হয়েছে");
    }else{
      data.blocks.push({
        id:newId(),
        numbers:numbers,
        limitMode:false,
        copyAmountMode:false,
        marks:numbers.map(function(){
          return [null,null,null,null,null,null];
        })
      });

      toast("নাম্বার সেভ হয়েছে");
    }

    saveData();
    render();
    closeModal();
  });

  byId("blocks").addEventListener("click",function(event){
    var button = event.target.closest("button[data-action]");
    if(!button) return;

    var block = data.blocks.find(function(item){
      return item.id === button.dataset.id;
    });

    if(!block) return;

    var action = button.dataset.action;

    if(action === "copy-amount"){
      block.copyAmountMode = !block.copyAmountMode;
      saveData();
      render();
      return;
    }

    if(action === "limit"){
      block.limitMode = !block.limitMode;
      saveData();
      render();
      return;
    }

    if(action === "block-day"){
      toggleWholeDay(block,parseInt(button.dataset.day,10));
      saveData();
      render();
      return;
    }

    if(action === "number-day"){
      toggleOne(
        block,
        parseInt(button.dataset.number,10),
        parseInt(button.dataset.day,10)
      );
      saveData();
      render();
      return;
    }

    if(action === "copy"){
      var text;

      if(block.copyAmountMode){
        text = block.numbers.map(function(number){
          return number+" ✅\n50000";
        }).join("\n\n");

        copyText(text,"নাম্বার ও 50000 কপি হয়েছে");
      }else{
        text = block.numbers.join("\n");
        copyText(text,"সব নাম্বার কপি হয়েছে");
      }

      return;
    }

    if(action === "edit"){
      openEditModal(block);
      return;
    }

    if(action === "delete"){
      var confirmed = confirm("এই ব্লক ডিলিট করবেন?");

      if(confirmed){
        data.blocks = data.blocks.filter(function(item){
          return item.id !== block.id;
        });

        saveData();
        render();
      }
    }
  });

  render();

  if(window.firebaseDB){
    window.firebaseDB.ref(FIREBASE_PATH).on(
      "value",
      function(snapshot){
        cloudReady = true;
        var cloudValue = snapshot.val();

        if(typeof cloudValue === "string" && cloudValue){
          try{
            var parsed = JSON.parse(cloudValue);
            if(parsed && Array.isArray(parsed.blocks)){
              applyingCloudData = true;
              data = parsed;
              data.blocks.forEach(normalizeBlock);
              saveLocalData();
              render();
            }
          }catch(error){
            console.error("Cloud data parse failed:", error);
            toast("Cloud data পড়া যায়নি");
          }finally{
            applyingCloudData = false;
          }
        }else{
          window.firebaseDB.ref(FIREBASE_PATH).set(JSON.stringify(data))
            .catch(function(error){
              console.error("Initial Firebase save failed:", error);
            });
        }
      },
      function(error){
        cloudReady = false;
        console.error("Firebase read failed:", error);
        toast("Offline mode: ফোনে save হবে");
      }
    );
  }else{
    console.error("Firebase unavailable:", window.firebaseInitError);
  }
})();
</script>
</body>
</html>
