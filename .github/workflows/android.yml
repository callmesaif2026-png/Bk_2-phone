name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Capacitor
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Setup Capacitor
        run: |
          npx cap init "Bk List" "com.bklist.app" --web-dir=www

      - name: Add Android
        run: |
          npx cap add android

      - name: Copy Web Files
        run: |
          npx cap copy android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bk-list-apk
          path: android/app/build/outputs/apk/bklist/app-bklist.apk
