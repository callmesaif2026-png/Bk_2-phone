<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Limit Manager</title>
<style>
:root{
  --bg:#07111f; --card:#101d2d; --card2:#16263a; --border:#263a50;
  --text:#fff; --muted:#9aabba; --pink:#e61768; --green:#1fc76a; --red:#ff4d5e;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}
button,input{font:inherit}
button{cursor:pointer}
.app{max-width:720px;margin:auto;padding:12px 10px 80px}
h1{font-size:20px;margin:0 0 12px}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px}
.sum{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 7px;min-width:0}
.sum span{display:block;font-size:10px;color:var(--muted);margin-bottom:6px}
.sum strong{font-size:13px;display:block;word-break:break-word}
.panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px;margin-bottom:10px}
.add-row{display:flex;gap:7px}
.input{width:100%;height:42px;border:1px solid var(--border);background:#0a1725;color:#fff;border-radius:10px;padding:0 11px;outline:none}
.btn{border:0;border-radius:10px;padding:10px 13px;color:#fff;background:var(--pink);font-weight:bold;white-space:nowrap}
.blocks{display:grid;gap:10px}
.block{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:10px}
.block-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
.block-title{font-size:15px;font-weight:bold}
.copy-btn,.delete-btn{border:1px solid var(--border);background:#0a1725;color:#fff;border-radius:8px;padding:7px 10px;font-size:11px}
.delete-btn{color:#ff9ba5}
.numbers{display:grid;gap:5px;margin-bottom:9px}
.number{background:#0b1826;border-radius:8px;padding:8px 10px;font-size:14px}
.days{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:9px}
.day{border:1px solid rgba(31,199,106,.45);background:rgba(31,199,106,.15);color:#9af0bd;border-radius:9px;padding:9px 2px;font-weight:bold}
.day.used{border-color:rgba(255,77,94,.55);background:rgba(255,77,94,.18);color:#ff9da7}
.block-info{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.info{background:#0b1826;border-radius:8px;padding:8px}
.info span{display:block;font-size:9px;color:var(--muted);margin-bottom:4px}
.info strong{font-size:12px}
.empty{text-align:center;color:var(--muted);padding:30px 10px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;padding:10px;z-index:20}
.modal.hidden{display:none}
.modal-box{width:100%;max-width:520px;max-height:90vh;overflow:auto;background:var(--card);border:1px solid var(--border);border-radius:18px 18px 8px 8px;padding:15px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.modal-head h2{font-size:18px;margin:0}
.close{width:38px;height:38px;border:0;border-radius:9px;background:var(--card2);color:#fff}
.inputs{display:grid;gap:8px}
.input-line{display:grid;grid-template-columns:38px 1fr;gap:8px;align-items:center}
.idx{height:38px;display:grid;place-items:center;background:var(--card2);border-radius:9px;color:var(--pink);font-weight:bold}
.full-btn{width:100%;border:0;border-radius:10px;padding:12px;margin-top:10px;background:var(--pink);color:#fff;font-weight:bold}
.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#fff;color:#111;padding:10px 14px;border-radius:10px;font-weight:bold;z-index:30}
.toast.hidden{display:none}
@media(max-width:380px){
  .summary{gap:5px}
  .sum{padding:8px 5px}
  .sum span{font-size:9px}
  .sum strong{font-size:12px}
}
</style>
</head>
<body>

<div class="app">
  <h1>Number Limit Manager</h1>

  <div class="summary">
    <div class="sum"><span>মোট ব্লক</span><strong id="totalBlocks">0</strong></div>
    <div class="sum"><span>মোট নাম্বার</span><strong id="totalNumbers">0</strong></div>
    <div class="sum"><span>মোট লিমিট</span><strong id="totalLimit">৳0</strong></div>
    <div class="sum"><span>বাকি লিমিট</span><strong id="remainingLimit">৳0</strong></div>
  </div>

  <div class="panel">
    <div class="add-row">
      <input class="input" id="blockCount" type="number" min="1" max="50" value="4" placeholder="কয়টি নাম্বার">
      <button class="btn" type="button" id="addBlockBtn">Add New Number</button>
    </div>
  </div>

  <div id="empty" class="panel empty">এখনও কোনো ব্লক যোগ করা হয়নি</div>
  <div id="blocks" class="blocks"></div>
</div>

<div id="modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-head">
      <h2>নাম্বার দিন</h2>
      <button class="close" type="button" id="closeModal">✕</button>
    </div>
    <form id="numberForm">
      <div id="inputs" class="inputs"></div>
      <button class="full-btn" type="submit">Submit</button>
    </form>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "simple_limit_manager_v2";
  var PER_NUMBER_LIMIT = 300000;
  var DAILY_AMOUNT = 50000;
  var data = loadData();

  function byId(id){ return document.getElementById(id); }

  function loadData(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return {blocks:[]};
      var parsed = JSON.parse(raw);
      if(parsed && Array.isArray(parsed.blocks)) return parsed;
    }catch(e){}
    return {blocks:[]};
  }

  function saveData(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function money(value){
    return new Intl.NumberFormat("en-IN").format(value);
  }

  function toast(message){
    var t = byId("toast");
    t.textContent = message;
    t.classList.remove("hidden");
    clearTimeout(toast.timer);
    toast.timer = setTimeout(function(){
      t.classList.add("hidden");
    }, 1800);
  }

  function openModal(){
    var count = parseInt(byId("blockCount").value, 10);
    if(isNaN(count) || count < 1) count = 1;
    if(count > 50) count = 50;

    var wrap = byId("inputs");
    wrap.innerHTML = "";

    for(var i=1; i<=count; i++){
      var row = document.createElement("div");
      row.className = "input-line";
      row.innerHTML =
        '<div class="idx">'+i+'</div>' +
        '<input class="input phone-input" type="tel" inputmode="numeric" maxlength="11" placeholder="01XXXXXXXXX" required>';
      wrap.appendChild(row);
    }

    byId("modal").classList.remove("hidden");

    setTimeout(function(){
      var first = document.querySelector(".phone-input");
      if(first) first.focus();
    }, 50);
  }

  function closeModal(){
    byId("modal").classList.add("hidden");
    byId("inputs").innerHTML = "";
  }

  function render(){
    var container = byId("blocks");
    container.innerHTML = "";

    var totalNumbers = 0;
    var totalLimit = 0;
    var totalRemaining = 0;

    data.blocks.forEach(function(block, index){
      var count = block.numbers.length;
      var usedDays = block.days.filter(Boolean).length;
      var blockLimit = count * PER_NUMBER_LIMIT;
      var used = usedDays * count * DAILY_AMOUNT;
      var remaining = Math.max(blockLimit - used, 0);

      totalNumbers += count;
      totalLimit += blockLimit;
      totalRemaining += remaining;

      var dayButtons = block.days.map(function(used, i){
        return '<button type="button" class="day '+(used ? 'used' : '')+'" data-action="day" data-id="'+block.id+'" data-day="'+i+'">'+(i+1)+'</button>';
      }).join("");

      var numbersHtml = block.numbers.map(function(n){
        return '<div class="number">'+n+'</div>';
      }).join("");

      var div = document.createElement("div");
      div.className = "block";
      div.innerHTML =
        '<div class="block-top">' +
          '<div class="block-title">Block '+(index+1)+'</div>' +
          '<div>' +
            '<button type="button" class="copy-btn" data-action="copy" data-id="'+block.id+'">Copy</button> ' +
            '<button type="button" class="delete-btn" data-action="delete" data-id="'+block.id+'">Delete</button>' +
          '</div>' +
        '</div>' +
        '<div class="numbers">'+numbersHtml+'</div>' +
        '<div class="days">'+dayButtons+'</div>' +
        '<div class="block-info">' +
          '<div class="info"><span>Block Limit</span><strong>৳'+money(blockLimit)+'</strong></div>' +
          '<div class="info"><span>Used</span><strong>৳'+money(used)+'</strong></div>' +
          '<div class="info"><span>Remaining</span><strong>৳'+money(remaining)+'</strong></div>' +
        '</div>';

      container.appendChild(div);
    });

    byId("totalBlocks").textContent = data.blocks.length;
    byId("totalNumbers").textContent = totalNumbers;
    byId("totalLimit").textContent = "৳" + money(totalLimit);
    byId("remainingLimit").textContent = "৳" + money(totalRemaining);
    byId("empty").style.display = data.blocks.length ? "none" : "block";
  }

  byId("addBlockBtn").addEventListener("click", openModal);
  byId("closeModal").addEventListener("click", closeModal);

  byId("modal").addEventListener("click", function(e){
    if(e.target === byId("modal")) closeModal();
  });

  byId("numberForm").addEventListener("submit", function(e){
    e.preventDefault();

    var inputs = Array.prototype.slice.call(document.querySelectorAll(".phone-input"));
    var numbers = inputs.map(function(input){
      return input.value.replace(/\D/g, "");
    });

    if(numbers.some(function(n){ return !/^01\d{9}$/.test(n); })){
      toast("সঠিক ১১ ডিজিটের নাম্বার দিন");
      return;
    }

    data.blocks.push({
      id: String(Date.now()) + Math.random().toString(16).slice(2),
      numbers: numbers,
      days: [false,false,false,false,false,false]
    });

    saveData();
    render();
    closeModal();
    toast("Block added");
  });

  byId("blocks").addEventListener("click", function(e){
    var btn = e.target.closest("button[data-action]");
    if(!btn) return;

    var block = data.blocks.find(function(b){ return b.id === btn.dataset.id; });
    if(!block) return;

    var action = btn.dataset.action;

    if(action === "day"){
      var dayIndex = parseInt(btn.dataset.day, 10);
      block.days[dayIndex] = !block.days[dayIndex];
      saveData();
      render();
    }

    if(action === "copy"){
      var text = block.numbers.join("\n");

      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(function(){
          toast("সব নাম্বার কপি হয়েছে");
        }).catch(function(){
          fallbackCopy(text);
        });
      }else{
        fallbackCopy(text);
      }
    }

    if(action === "delete"){
      if(confirm("এই ব্লক ডিলিট করবেন?")){
        data.blocks = data.blocks.filter(function(b){ return b.id !== block.id; });
        saveData();
        render();
      }
    }
  });

  function fallbackCopy(text){
    var ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();
    toast("সব নাম্বার কপি হয়েছে");
  }

  render();
})();
</script>
</body>
</html>
